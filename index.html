<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhasebe Yönetim Sistemi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#f5f5f5;color:#1a1a1a}
.hidden{display:none!important}

#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;background:#f5f5f5}
.login-box{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.login-logo{width:48px;height:48px;background:#1a1a1a;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin:0 auto 1rem}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;text-align:center;margin-bottom:1.5rem}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#666;display:block;margin-bottom:5px;font-weight:500}
input,select{width:100%;font-size:14px;padding:10px 12px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#1a1a1a;transition:border-color 0.15s;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#999}
.btn-login{width:100%;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:4px;transition:opacity 0.15s}
.btn-login:hover{opacity:0.8}
.login-error{color:#dc2626;font-size:13px;text-align:center;margin-top:8px;display:none}

#main-app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.app-logo{width:32px;height:32px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.app-name{font-size:15px;font-weight:600}
.user-badge{font-size:12px;color:#666;background:#f0f0f0;padding:3px 10px;border-radius:99px}
.logout-btn{font-size:13px;cursor:pointer;color:#666;background:none;border:1px solid #e5e5e5;padding:5px 12px;border-radius:8px;transition:all 0.15s}
.logout-btn:hover{background:#f5f5f5}

.nav{display:flex;gap:2px;padding:8px 16px;background:#fff;border-bottom:1px solid #e5e5e5;overflow-x:auto}
.nav-btn{font-size:13px;padding:7px 14px;border:none;background:transparent;cursor:pointer;border-radius:8px;color:#666;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.nav-btn:hover{background:#f5f5f5;color:#1a1a1a}
.nav-btn.active{background:#1a1a1a;color:#fff}

.content{flex:1;overflow-y:auto;padding:20px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px}
.stat-label{font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
.stat-val{font-size:22px;font-weight:700}
.stat-green{color:#16a34a}.stat-red{color:#dc2626}.stat-blue{color:#2563eb}.stat-amber{color:#d97706}

.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e5e5}
.card-title{font-size:14px;font-weight:600}
.add-btn{font-size:12px;padding:6px 12px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:4px}
.add-btn:hover{opacity:0.8}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:600;font-size:11px;color:#888;padding:10px 16px;background:#fafafa;text-transform:uppercase;letter-spacing:0.5px}
td{padding:11px 16px;border-top:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafafa}
.empty-state{text-align:center;padding:3rem;color:#aaa;font-size:14px}

.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-purple{background:#f3e8ff;color:#6b21a8}

.profit-pos{color:#16a34a;font-weight:600}
.profit-neg{color:#dc2626;font-weight:600}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-primary{padding:9px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{opacity:0.8}
.btn-secondary{padding:9px 16px;background:transparent;border:1px solid #e5e5e5;border-radius:8px;cursor:pointer;font-size:13px;color:#1a1a1a}
.btn-secondary:hover{background:#f5f5f5}
.delete-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:4px 8px;border-radius:6px}
.delete-btn:hover{color:#dc2626;background:#fee2e2}

.taksit-item{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:10px}
.taksit-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.taksit-name{font-size:15px;font-weight:600}
.taksit-desc{font-size:12px;color:#888;margin-top:2px}
.progress-bg{background:#f0f0f0;border-radius:99px;height:6px;margin:10px 0}
.progress-fill{height:6px;border-radius:99px;background:#16a34a}
.taksit-footer{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#888}
.urgency-red{color:#dc2626!important;font-weight:600}
.urgency-amber{color:#d97706!important;font-weight:600}

.tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;padding:4px;border-radius:10px;border:1px solid #e5e5e5;width:fit-content}
.tab-btn{font-size:13px;padding:6px 14px;border:none;border-radius:7px;cursor:pointer;background:transparent;color:#666;font-weight:500}
.tab-btn.active{background:#1a1a1a;color:#fff}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rapor-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rapor-bar-label{font-size:12px;color:#666;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rapor-bar-bg{flex:1;background:#f0f0f0;border-radius:99px;height:8px}
.rapor-bar-fill{height:8px;border-radius:99px;background:#1a1a1a}
.rapor-bar-val{font-size:12px;font-weight:600;min-width:90px;text-align:right}

.offline-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:6px 16px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:6px}

.log-row td{font-size:12px}
.loading{text-align:center;padding:2rem;color:#aaa}

.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}

@media(max-width:600px){
  .two-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-chart-bar"></i></div>
    <div class="login-title">Muhasebe Sistemi</div>
    <div class="login-sub">E-posta ve şifrenizle giriş yapın</div>
    <div class="form-group"><label class="form-label">E-posta</label><input id="login-email" type="email" placeholder="ornek@sirket.com"></div>
    <div class="form-group"><label class="form-label">Şifre</label><input id="login-sifre" type="password" placeholder="Şifreniz"></div>
    <button class="btn-login" onclick="girisYap()">Giriş Yap</button>
    <div class="login-error" id="login-error">E-posta veya şifre hatalı!</div>
  </div>
</div>

<div id="main-app" class="hidden">
  <div id="offline-banner" class="offline-banner hidden"><i class="ti ti-wifi-off"></i> İnternet bağlantısı yok — değişiklikler bağlanınca senkronize edilecek</div>
  <div class="header">
    <div class="header-left">
      <div class="app-logo"><i class="ti ti-chart-bar" style="font-size:16px"></i></div>
      <span class="app-name">Muhasebe</span>
      <span class="user-badge" id="user-badge"></span>
    </div>
    <button class="logout-btn" onclick="cikisYap()"><i class="ti ti-logout"></i> Çıkış</button>
  </div>
  <div class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')"><i class="ti ti-home"></i> Genel Bakış</button>
    <button class="nav-btn" id="nav-urunler" onclick="showPage('urunler')"><i class="ti ti-package"></i> Ürünler</button>
    <button class="nav-btn" id="nav-harcamalar" onclick="showPage('harcamalar')"><i class="ti ti-receipt"></i> Harcamalar</button>
    <button class="nav-btn" id="nav-taksitler" onclick="showPage('taksitler')"><i class="ti ti-calendar-due"></i> Taksitler</button>
    <button class="nav-btn" id="nav-raporlar" onclick="showPage('raporlar')"><i class="ti ti-report-analytics"></i> Raporlar</button>
    <button class="nav-btn" id="nav-loglar" onclick="showPage('loglar')"><i class="ti ti-history"></i> İşlem Geçmişi</button>
  </div>
  <div class="content" id="content-area"></div>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn-primary" id="modal-save-btn">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://aslgdyhplqhqbbwluscj.supabase.co';
const SUPA_KEY = 'sb_publishable__OyPFqqNTQOOFi-iRxYEew_iysOy_Nn';

const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Prefer': 'return=representation'
};

let currentUser = null;
let isOnline = navigator.onLine;
let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
let localCache = JSON.parse(localStorage.getItem('localCache') || '{"urunler":[],"harcamalar":[],"taksitler":[],"islem_loglari":[]}');

// Online/offline takip
window.addEventListener('online', () => { isOnline = true; updateOfflineBanner(); syncOfflineQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateOfflineBanner(); });

function updateOfflineBanner(){
  document.getElementById('offline-banner').classList.toggle('hidden', isOnline);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// SUPABASE FETCH
async function sbGet(table, params=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}&order=id.desc`, {headers: HEADERS});
  return r.json();
}
async function sbPost(table, body){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {method:'POST', headers: HEADERS, body: JSON.stringify(body)});
  return r.json();
}
async function sbDelete(table, id){
  await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {method:'DELETE', headers: HEADERS});
}
async function sbPatch(table, id, body){
  await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {method:'PATCH', headers: HEADERS, body: JSON.stringify(body)});
}

// LOG
async function logEkle(islem, detay){
  const log = {kullanici: currentUser.ad, islem, detay, tarih: new Date().toISOString()};
  if(isOnline){
    await sbPost('islem_loglari', log);
  } else {
    offlineQueue.push({type:'log', data: log});
    localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
  }
}

// OFFLINE SYNC
async function syncOfflineQueue(){
  if(!offlineQueue.length) return;
  showToast('Bağlantı sağlandı, veriler senkronize ediliyor...');
  const queue = [...offlineQueue];
  offlineQueue = [];
  localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
  for(const item of queue){
    try{
      if(item.type === 'insert') await sbPost(item.table, item.data);
      else if(item.type === 'delete') await sbDelete(item.table, item.id);
      else if(item.type === 'patch') await sbPatch(item.table, item.id, item.data);
      else if(item.type === 'log') await sbPost('islem_loglari', item.data);
    } catch(e){}
  }
  showToast('✓ Veriler başarıyla senkronize edildi!');
  showPage(document.querySelector('.nav-btn.active').id.replace('nav-',''));
}

// Offline-safe işlemler
async function safeInsert(table, data){
  if(isOnline){
    return await sbPost(table, data);
  } else {
    offlineQueue.push({type:'insert', table, data});
    localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
    localCache[table] = localCache[table] || [];
    localCache[table].unshift({...data, id: 'local_'+Date.now()});
    localStorage.setItem('localCache', JSON.stringify(localCache));
    return [data];
  }
}
async function safeDelete(table, id){
  if(isOnline){
    await sbDelete(table, id);
  } else {
    offlineQueue.push({type:'delete', table, id});
    localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
    localCache[table] = (localCache[table]||[]).filter(r=>r.id!==id);
    localStorage.setItem('localCache', JSON.stringify(localCache));
  }
}
async function safePatch(table, id, data){
  if(isOnline){
    await sbPatch(table, id, data);
  } else {
    offlineQueue.push({type:'patch', table, id, data});
    localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
    localCache[table] = (localCache[table]||[]).map(r=>r.id===id?{...r,...data}:r);
    localStorage.setItem('localCache', JSON.stringify(localCache));
  }
}
async function safeGet(table, params=''){
  if(isOnline){
    const data = await sbGet(table, params);
    localCache[table] = data;
    localStorage.setItem('localCache', JSON.stringify(localCache));
    return data;
  } else {
    return localCache[table] || [];
  }
}

// GİRİŞ
async function girisYap(){
  const email = document.getElementById('login-email').value.trim();
  const sifre = document.getElementById('login-sifre').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email || !sifre){ errEl.style.display='block'; errEl.textContent='Lütfen tüm alanları doldurun!'; return; }

  if(isOnline){
    try{
      const data = await sbGet('kullanicilar', `email=eq.${email}&sifre=eq.${sifre}`);
      if(data && data.length > 0){
        currentUser = data[0];
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        girisBitti();
        await logEkle('Giriş', 'Sisteme giriş yapıldı');
      } else {
        errEl.style.display = 'block';
        errEl.textContent = 'E-posta veya şifre hatalı!';
      }
    } catch(e){
      errEl.style.display = 'block';
      errEl.textContent = 'Bağlantı hatası, lütfen tekrar deneyin.';
    }
  } else {
    const saved = localStorage.getItem('currentUser');
    if(saved){
      const u = JSON.parse(saved);
      if(u.email === email){
        currentUser = u;
        girisBitti();
      } else {
        errEl.style.display = 'block';
        errEl.textContent = 'İnternetsiz modda sadece son giriş yapan kullanıcı giriş yapabilir.';
      }
    } else {
      errEl.style.display = 'block';
      errEl.textContent = 'İnternet bağlantısı yok, önce çevrimiçi giriş yapmanız gerekiyor.';
    }
  }
}

function girisBitti(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('user-badge').textContent = currentUser.ad + ' · ' + (currentUser.rol==='yonetici'?'Yönetici':'Çalışan');
  updateOfflineBanner();
  showPage('dashboard');
}

function cikisYap(){
  logEkle('Çıkış', 'Sistemden çıkış yapıldı');
  currentUser = null;
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-sifre').value = '';
}

// SAYFA YÖNETİMİ
function showPage(page){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+page);
  if(nb) nb.classList.add('active');
  const ca = document.getElementById('content-area');
  ca.innerHTML = '<div class="loading"><i class="ti ti-loader" style="font-size:24px"></i><br>Yükleniyor...</div>';
  if(page==='dashboard') renderDashboard();
  else if(page==='urunler') renderUrunler();
  else if(page==='harcamalar') renderHarcamalar();
  else if(page==='taksitler') renderTaksitler();
  else if(page==='raporlar') renderRaporlar();
  else if(page==='loglar') renderLoglar();
}

function fmt(n){ return Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'; }
function bugun(){ return new Date().toISOString().split('T')[0]; }
function buAy(){ return bugun().slice(0,7); }

// DASHBOARD
async function renderDashboard(){
  const [harcamalar, urunler, taksitler] = await Promise.all([
    safeGet('harcamalar'), safeGet('urunler'), safeGet('taksitler')
  ]);
  const buAyHarc = harcamalar.filter(h=>h.tarih&&h.tarih.slice(0,7)===buAy()).reduce((s,h)=>s+Number(h.tutar||0),0);
  const potKar = urunler.reduce((s,u)=>s+(Number(u.satis_fiyati||0)-Number(u.alis_fiyati||0))*Number(u.stok||0),0);
  const stokDeger = urunler.reduce((s,u)=>s+Number(u.alis_fiyati||0)*Number(u.stok||0),0);
  const aylikTaksit = taksitler.filter(t=>!t.odendi).reduce((s,t)=>s+Number(t.aylik_tutar||0),0);
  const sonHarc = [...harcamalar].slice(0,5);
  const yakTaksit = taksitler.filter(t=>!t.odendi).sort((a,b)=>(a.son_odeme||'')>(b.son_odeme||'')?1:-1).slice(0,3);

  document.getElementById('content-area').innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Bu ay harcama</div><div class="stat-val stat-red">${fmt(buAyHarc)}</div></div>
    <div class="stat-card"><div class="stat-label">Potansiyel kâr</div><div class="stat-val stat-green">${fmt(potKar)}</div></div>
    <div class="stat-card"><div class="stat-label">Stok değeri</div><div class="stat-val stat-blue">${fmt(stokDeger)}</div></div>
    <div class="stat-card"><div class="stat-label">Aylık taksit yükü</div><div class="stat-val stat-amber">${fmt(aylikTaksit)}</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Son harcamalar</span></div>
      <table><thead><tr><th>Açıklama</th><th>Tarih</th><th>Tutar</th><th>Ekleyen</th></tr></thead><tbody>
      ${sonHarc.length?sonHarc.map(h=>`<tr><td>${h.aciklama}</td><td style="color:#aaa;font-size:12px">${h.tarih||''}</td><td style="font-weight:600">${fmt(h.tutar)}</td><td style="color:#aaa;font-size:12px">${h.ekleyen||''}</td></tr>`).join(''):'<tr><td colspan="4" class="empty-state">Kayıt yok</td></tr>'}
      </tbody></table>
    </div>
    <div>
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">Yaklaşan taksitler</div>
      ${yakTaksit.map(t=>{
        const kalan=t.son_odeme?Math.ceil((new Date(t.son_odeme)-new Date())/864e5):null;
        const cls=kalan!==null&&kalan<=7?'urgency-red':kalan!==null&&kalan<=15?'urgency-amber':'';
        return`<div class="taksit-item"><div class="taksit-header"><div><div class="taksit-name">${t.ad}</div></div><span class="badge badge-amber">${fmt(t.aylik_tutar)}/ay</span></div>
        <div class="taksit-footer"><span class="${cls}">${kalan!==null?kalan+' gün kaldı':''}</span><span>Son: ${t.son_odeme||'-'}</span></div></div>`;
      }).join('')||'<div style="color:#aaa;font-size:14px">Aktif taksit yok</div>'}
    </div>
  </div>`;
}

// ÜRÜNLER
async function renderUrunler(){
  const urunler = await safeGet('urunler');
  const isAdmin = currentUser.rol==='yonetici';
  document.getElementById('content-area').innerHTML = `
  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="ti ti-package" style="margin-right:6px"></i>Ürün listesi (${urunler.length})</span>
      ${isAdmin?`<button class="add-btn" onclick="openUrunModal()"><i class="ti ti-plus"></i> Ürün ekle</button>`:''}
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid #f0f0f0">
      <input placeholder="Ürün ara..." oninput="filterUrunler(this.value,${JSON.stringify(urunler).replace(/"/g,'&quot;')})" style="max-width:240px;padding:7px 12px;font-size:13px">
    </div>
    <table><thead><tr><th>Ürün adı</th><th>Kategori</th><th>Alış</th><th>Satış</th><th>Birim kâr</th><th>Stok</th><th>Ekleyen</th>${isAdmin?'<th></th>':''}</tr></thead>
    <tbody id="urun-tbody">${urunRows(urunler,isAdmin)}</tbody></table>
  </div>`;
}
function urunRows(list,isAdmin){
  if(!list.length) return`<tr><td colspan="8" class="empty-state">Henüz ürün eklenmedi</td></tr>`;
  return list.map(u=>{
    const kar=Number(u.satis_fiyati||0)-Number(u.alis_fiyati||0);
    return`<tr>
      <td><strong>${u.ad}</strong></td>
      <td><span class="badge badge-blue">${u.kategori||'-'}</span></td>
      <td>${fmt(u.alis_fiyati)}</td><td>${fmt(u.satis_fiyati)}</td>
      <td class="${kar>=0?'profit-pos':'profit-neg'}">${fmt(kar)}</td>
      <td><span class="badge ${Number(u.stok)>0?'badge-green':'badge-red'}">${u.stok||0}</span></td>
      <td style="font-size:12px;color:#aaa">${u.ekleyen||''}</td>
      ${isAdmin?`<td><button class="delete-btn" onclick="deleteUrun('${u.id}')"><i class="ti ti-trash"></i></button></td>`:''}
    </tr>`;
  }).join('');
}
function filterUrunler(q, list){
  const filtered = list.filter(u=>u.ad.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('urun-tbody').innerHTML = urunRows(filtered, currentUser.rol==='yonetici');
}

// HARCAMALAR
async function renderHarcamalar(){
  const harcamalar = await safeGet('harcamalar');
  const isAdmin = currentUser.rol==='yonetici';
  document.getElementById('content-area').innerHTML = `
  <div class="tabs">
    <button class="tab-btn active" onclick="filterHarc(this,'hepsi')">Tümü</button>
    <button class="tab-btn" onclick="filterHarc(this,'bugun')">Bugün</button>
    <button class="tab-btn" onclick="filterHarc(this,'buay')">Bu ay</button>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title" id="harc-title">Tüm harcamalar</span>
      <button class="add-btn" onclick="openHarcamaModal()"><i class="ti ti-plus"></i> Ekle</button>
    </div>
    <table><thead><tr><th>Açıklama</th><th>Kategori</th><th>Tarih</th><th>Tutar</th><th>Ekleyen</th>${isAdmin?'<th></th>':''}</tr></thead>
    <tbody id="harc-tbody">${harcRows(harcamalar,isAdmin)}</tbody>
  </table></div>`;
  window._tumHarcamalar = harcamalar;
}
function harcRows(list,isAdmin){
  if(!list.length) return`<tr><td colspan="6" class="empty-state">Kayıt bulunamadı</td></tr>`;
  return list.map(h=>`<tr>
    <td>${h.aciklama}</td>
    <td><span class="badge badge-amber">${h.kategori||'-'}</span></td>
    <td style="color:#aaa;font-size:12px">${h.tarih||''}</td>
    <td><strong>${fmt(h.tutar)}</strong></td>
    <td style="color:#aaa;font-size:12px">${h.ekleyen||''}</td>
    ${isAdmin?`<td><button class="delete-btn" onclick="deleteHarcama('${h.id}')"><i class="ti ti-trash"></i></button></td>`:''}
  </tr>`).join('');
}
function filterHarc(btn,filter){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const list = window._tumHarcamalar||[];
  let filtered=list, title='Tüm harcamalar';
  if(filter==='bugun'){filtered=list.filter(h=>h.tarih===bugun());title='Bugünkü harcamalar';}
  else if(filter==='buay'){filtered=list.filter(h=>h.tarih&&h.tarih.slice(0,7)===buAy());title='Bu ayki harcamalar';}
  document.getElementById('harc-title').textContent=title;
  document.getElementById('harc-tbody').innerHTML=harcRows(filtered,currentUser.rol==='yonetici');
}

// TAKSİTLER
async function renderTaksitler(){
  const taksitler = await safeGet('taksitler');
  const isAdmin = currentUser.rol==='yonetici';
  const aktif = taksitler.filter(t=>!t.odendi);
  const tamam = taksitler.filter(t=>t.odendi);
  document.getElementById('content-area').innerHTML = `
  ${isAdmin?`<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="add-btn" onclick="openTaksitModal()"><i class="ti ti-plus"></i> Taksit ekle</button></div>`:''}
  <div style="font-size:13px;color:#888;margin-bottom:14px">Aktif: <strong style="color:#1a1a1a">${aktif.length}</strong> &nbsp;·&nbsp; Tamamlanan: <strong style="color:#1a1a1a">${tamam.length}</strong></div>
  ${aktif.length===0?'<div class="card" style="padding:2rem;text-align:center;color:#aaa">Aktif taksit bulunmuyor</div>':''}
  ${aktif.map(t=>{
    const kalan=t.son_odeme?Math.ceil((new Date(t.son_odeme)-new Date())/864e5):null;
    const pct=Math.round(((Number(t.toplam_ay||1)-Number(t.kalan_ay||1))/Number(t.toplam_ay||1))*100);
    const cls=kalan!==null&&kalan<=7?'urgency-red':kalan!==null&&kalan<=15?'urgency-amber':'';
    return`<div class="taksit-item">
      <div class="taksit-header">
        <div><div class="taksit-name">${t.ad}</div><div class="taksit-desc">${t.aciklama||''}</div></div>
        <div style="text-align:right"><span class="badge badge-amber">${fmt(t.aylik_tutar)}/ay</span><div style="font-size:12px;color:#888;margin-top:4px">${t.kalan_ay}/${t.toplam_ay} ay kaldı</div></div>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="taksit-footer">
        <span class="${cls}">Son ödeme: ${t.son_odeme||'-'}${kalan!==null?' ('+kalan+' gün)':''}</span>
        ${isAdmin?`<div style="display:flex;gap:6px">
          <button onclick="odemeyiKapat('${t.id}')" style="font-size:11px;padding:4px 10px;border:1px solid #e5e5e5;border-radius:6px;cursor:pointer;background:#fff">✓ Ödendi</button>
          <button class="delete-btn" onclick="deleteTaksit('${t.id}')"><i class="ti ti-trash"></i></button>
        </div>`:''}
      </div>
    </div>`;
  }).join('')}
  ${tamam.length?`<div style="font-size:14px;font-weight:600;margin:20px 0 10px;color:#888">Tamamlananlar</div>
  ${tamam.map(t=>`<div class="taksit-item" style="opacity:0.5">
    <div class="taksit-header"><div class="taksit-name">${t.ad}</div><span class="badge badge-green">Ödendi</span></div>
    <div style="font-size:12px;color:#aaa;margin-top:4px">${fmt(t.aylik_tutar)}/ay · ${t.toplam_ay} ay</div>
  </div>`).join('')}`:''}`;
}

// RAPORLAR
async function renderRaporlar(){
  const [harcamalar, urunler] = await Promise.all([safeGet('harcamalar'), safeGet('urunler')]);
  const months={}, katMap={};
  harcamalar.forEach(h=>{
    const m=h.tarih?h.tarih.slice(0,7):'?';
    months[m]=(months[m]||0)+Number(h.tutar||0);
    const k=h.kategori||'Diğer';
    katMap[k]=(katMap[k]||0)+Number(h.tutar||0);
  });
  const maxKat=Math.max(...Object.values(katMap),1);
  const topUrunler=[...urunler].sort((a,b)=>((Number(b.satis_fiyati||0)-Number(b.alis_fiyati||0))*Number(b.stok||0))-((Number(a.satis_fiyati||0)-Number(a.alis_fiyati||0))*Number(a.stok||0))).slice(0,5);
  const toplamHarc=harcamalar.reduce((s,h)=>s+Number(h.tutar||0),0);
  const buAyHarc=harcamalar.filter(h=>h.tarih&&h.tarih.slice(0,7)===buAy()).reduce((s,h)=>s+Number(h.tutar||0),0);

  document.getElementById('content-area').innerHTML = `
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">Toplam harcama</div><div class="stat-val stat-red">${fmt(toplamHarc)}</div></div>
    <div class="stat-card"><div class="stat-label">Bu ay</div><div class="stat-val stat-amber">${fmt(buAyHarc)}</div></div>
    <div class="stat-card"><div class="stat-label">Toplam ürün</div><div class="stat-val stat-blue">${urunler.length}</div></div>
    <div class="stat-card"><div class="stat-label">Toplam kayıt</div><div class="stat-val">${harcamalar.length}</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Kategoriye göre harcama</span></div>
      <div style="padding:16px">
        ${Object.entries(katMap).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div class="rapor-bar">
          <span class="rapor-bar-label">${k}</span>
          <div class="rapor-bar-bg"><div class="rapor-bar-fill" style="width:${Math.round(v/maxKat*100)}%"></div></div>
          <span class="rapor-bar-val">${fmt(v)}</span>
        </div>`).join('')||'<div style="color:#aaa;font-size:13px">Veri yok</div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Aylık harcama</span></div>
      <table><thead><tr><th>Ay</th><th>Toplam</th></tr></thead><tbody>
        ${Object.entries(months).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,8).map(([m,v])=>`<tr><td>${m}</td><td><strong>${fmt(v)}</strong></td></tr>`).join('')||'<tr><td colspan="2" class="empty-state">Veri yok</td></tr>'}
      </tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">En kârlı ürünler</span></div>
    <table><thead><tr><th>Ürün</th><th>Alış</th><th>Satış</th><th>Birim kâr</th><th>Stok</th><th>Toplam potansiyel</th></tr></thead><tbody>
      ${topUrunler.map(u=>{const bk=Number(u.satis_fiyati||0)-Number(u.alis_fiyati||0);const tk=bk*Number(u.stok||0);return`<tr><td><strong>${u.ad}</strong></td><td>${fmt(u.alis_fiyati)}</td><td>${fmt(u.satis_fiyati)}</td><td class="${bk>=0?'profit-pos':'profit-neg'}">${fmt(bk)}</td><td>${u.stok||0}</td><td class="profit-pos">${fmt(tk)}</td></tr>`;}).join('')||'<tr><td colspan="6" class="empty-state">Veri yok</td></tr>'}
    </tbody></table>
  </div>`;
}

// İŞLEM GEÇMİŞİ
async function renderLoglar(){
  const loglar = await safeGet('islem_loglari', 'limit=100');
  document.getElementById('content-area').innerHTML = `
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-history" style="margin-right:6px"></i>İşlem geçmişi (${loglar.length})</span></div>
    <table><thead><tr><th>Kullanıcı</th><th>İşlem</th><th>Detay</th><th>Tarih / Saat</th></tr></thead><tbody>
      ${loglar.length?loglar.map(l=>`<tr class="log-row">
        <td><span class="badge badge-purple">${l.kullanici||'-'}</span></td>
        <td><strong>${l.islem||''}</strong></td>
        <td style="color:#666">${l.detay||''}</td>
        <td style="color:#aaa">${l.tarih?new Date(l.tarih).toLocaleString('tr-TR'):''}</td>

// MODAL
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }

function openUrunModal(){
  document.getElementById('modal-title').textContent='Yeni ürün ekle';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-group"><label class="form-label">Ürün adı *</label><input id="f-ad" placeholder="Ürün adı"></div>
    <div class="form-group"><label class="form-label">Kategori</label><input id="f-kat" placeholder="Örn: Elektronik, Gıda"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Alış fiyatı (₺)</label><input id="f-alis" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Satış fiyatı (₺)</label><input id="f-satis" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="form-group"><label class="form-label">Stok adedi</label><input id="f-stok" type="number" min="0" placeholder="0"></div>`;
  document.getElementById('modal-save-btn').onclick=saveUrun;
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('f-ad').focus(),100);
}
async function saveUrun(){
  const ad=document.getElementById('f-ad').value.trim();
  if(!ad){showToast('Ürün adı zorunludur!');return;}
  const data={ad,kategori:document.getElementById('f-kat').value,alis_fiyati:document.getElementById('f-alis').value||0,satis_fiyati:document.getElementById('f-satis').value||0,stok:document.getElementById('f-stok').value||0,ekleyen:currentUser.ad};
  await safeInsert('urunler',data);
  await logEkle('Ürün eklendi', `"${ad}" ürünü eklendi`);
  showToast('✓ Ürün kaydedildi');
  closeModal(); renderUrunler();
}
async function deleteUrun(id){
  if(!confirm('Bu ürünü silmek istediğinize emin misiniz?'))return;
  await safeDelete('urunler',id);
  await logEkle('Ürün silindi','Ürün silindi (ID: '+id+')');
  showToast('Ürün silindi');
  renderUrunler();
}

function openHarcamaModal(){
  document.getElementById('modal-title').textContent='Harcama ekle';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-group"><label class="form-label">Açıklama *</label><input id="h-ac" placeholder="Harcama açıklaması"></div>
    <div class="form-group"><label class="form-label">Kategori</label>
      <select id="h-kat"><option>Kira</option><option>Elektrik / Su / Doğalgaz</option><option>Personel maaşı</option><option>Hammadde / Malzeme</option><option>Nakliye / Kargo</option><option>Pazarlama / Reklam</option><option>Bakım / Onarım</option><option>Vergi / SGK</option><option>Diğer</option></select></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Tutar (₺) *</label><input id="h-tutar" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Tarih</label><input id="h-tarih" type="date" value="${bugun()}"></div>
    </div>`;
  document.getElementById('modal-save-btn').onclick=saveHarcama;
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('h-ac').focus(),100);
}
async function saveHarcama(){
  const ac=document.getElementById('h-ac').value.trim();
  const tutar=document.getElementById('h-tutar').value;
  if(!ac||!tutar){showToast('Açıklama ve tutar zorunludur!');return;}
  const data={aciklama:ac,kategori:document.getElementById('h-kat').value,tutar,tarih:document.getElementById('h-tarih').value,ekleyen:currentUser.ad};
  await safeInsert('harcamalar',data);
  await logEkle('Harcama eklendi',`"${ac}" — ${tutar}₺`);
  showToast('✓ Harcama kaydedildi');
  closeModal(); renderHarcamalar();
}
async function deleteHarcama(id){
  if(!confirm('Bu harcamayı silmek istediğinize emin misiniz?'))return;
  await safeDelete('harcamalar',id);
  await logEkle('Harcama silindi','Harcama silindi (ID: '+id+')');
  showToast('Harcama silindi');
  renderHarcamalar();
}

function openTaksitModal(){
  document.getElementById('modal-title').textContent='Taksit ekle';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-group"><label class="form-label">Taksit adı *</label><input id="t-ad" placeholder="Örn: Araç kredisi"></div>
    <div class="form-group"><label class="form-label">Açıklama</label><input id="t-ac" placeholder="Opsiyonel"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Aylık tutar (₺) *</label><input id="t-tutar" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Toplam ay</label><input id="t-sure" type="number" min="1" placeholder="12"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Kalan ay</label><input id="t-kalan" type="number" min="0" placeholder="12"></div>
      <div class="form-group"><label class="form-label">Son ödeme tarihi</label><input id="t-son" type="date"></div>
    </div>`;
  document.getElementById('modal-save-btn').onclick=saveTaksit;
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('t-ad').focus(),100);
}
async function saveTaksit(){
  const ad=document.getElementById('t-ad').value.trim();
  const tutar=document.getElementById('t-tutar').value;
  if(!ad||!tutar){showToast('Taksit adı ve tutar zorunludur!');return;}
  const data={ad,aciklama:document.getElementById('t-ac').value,aylik_tutar:tutar,toplam_ay:parseInt(document.getElementById('t-sure').value)||1,kalan_ay:parseInt(document.getElementById('t-kalan').value)||1,son_odeme:document.getElementById('t-son').value||null,odendi:false,ekleyen:currentUser.ad};
  await safeInsert('taksitler',data);
  await logEkle('Taksit eklendi',`"${ad}" — ${tutar}₺/ay`);
  showToast('✓ Taksit kaydedildi');
  closeModal(); renderTaksitler();
}
async function deleteTaksit(id){
  if(!confirm('Bu taksiti silmek istediğinize emin misiniz?'))return;
  await safeDelete('taksitler',id);
  await logEkle('Taksit silindi','Taksit silindi (ID: '+id+')');
  showToast('Taksit silindi');
  renderTaksitler();
}
async function odemeyiKapat(id){
  if(!confirm('Taksiti ödendi olarak işaretlemek istediğinize emin misiniz?'))return;
  await safePatch('taksitler',id,{odendi:true});
  await logEkle('Taksit ödendi','Taksit ödendi olarak işaretlendi (ID: '+id+')');
  showToast('✓ Taksit ödendi olarak işaretlendi');
  renderTaksitler();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.getElementById('login-sifre').addEventListener('keydown',function(e){if(e.key==='Enter')girisYap();});
</script>
